name: "invoice_standard"
title: "Стандартный товарный чек"
description: "Чек с реквизитами продавца/покупателя и таблицей позиций"
version: "1.0"
template_file: "template.html"

locale:
  currency: "RUB"
  currency_symbol: "₽"
  date_format: "%d.%m.%Y"
  decimal_places: 2

required_fields:
  - invoice_id
  - issue_date
  - seller
  - buyer
  - items

optional_fields:
  - notes
  - discount_percent
  - payment_qr

schema:
  seller:
    required: [name, inn, address]
  buyer:
    required: [name]
    optional: [inn, address]
  items:
    required: [name, quantity, price]

computed_fields:
  - subtotal
  - discount_amount
  - tax_amount
  - total
  - generated_at

qr:
  enabled: true
  source_field: "payment_qr"
